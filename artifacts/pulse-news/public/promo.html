<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Popcorn — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Macabro';
    src: url('/fonts/MACABRO.woff2') format('woff2'),
         url('/fonts/MACABRO.woff') format('woff');
    font-weight: 400;
    font-style: normal;
    font-display: block;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #053980;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    width: 100vw;
  }

  /* 9:16 Instagram Story frame */
  .frame {
    position: relative;
    width: min(100vw, 56.25vh);   /* 9/16 of height */
    height: min(100vh, 177.78vw); /* 16/9 of width */
    background: #053980;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* ── Grain canvas ── */
  .grain {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  /* ── Centre content ── */
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    transform: translateY(-40px);
  }

  /* ── Popcorn SVG wrapper — appears immediately ── */
  @keyframes popcorn-in {
    0%   { opacity: 0; transform: scale(0.6) translateY(18px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  .popcorn-wrap {
    margin-top: -8px;
    opacity: 0;
    animation: popcorn-in 3s linear 0s both;
  }

  /* ── Wordmark — appears after 5s of animation ── */
  @keyframes wordmark-in {
    0%   { opacity: 0; transform: translateY(14px) scale(0.99); letter-spacing: 0.10em; }
    100% { opacity: 1; transform: translateY(0) scale(1); letter-spacing: 0.03em; }
  }
  .wordmark {
    font-family: 'Macabro', 'Anton', sans-serif;
    font-weight: 400;
    font-size: clamp(36px, 10vw, 48px);
    color: #fff1cd;
    letter-spacing: 0.03em;
    line-height: 1;
    text-transform: uppercase;
    filter: url(#sp-stamp);
    opacity: 0;
    animation: wordmark-in 1.8s linear 4.5s both;
  }

  /* ── Coming Soon — appears after wordmark ── */
  @keyframes coming-in {
    0%   { opacity: 0; transform: translateY(16px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .coming-soon {
    position: absolute;
    bottom: 18%;
    z-index: 2;
    font-family: 'Macabro', 'Anton', sans-serif;
    font-weight: 400;
    font-size: clamp(13px, 3.5vw, 16px);
    color: rgba(255, 241, 205, 0.55);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0;
    animation: coming-in 1.8s cubic-bezier(0.22,1,0.36,1) 6.8s both;
  }

  /* ── Popcorn SVG animations (same as splash) ── */
  @keyframes pc-a {
    0%,100% { transform: translateY(0) scaleY(1) scaleX(1); }
    20%     { transform: translateY(2px) scaleY(0.88) scaleX(1.1); }
    50%     { transform: translateY(-11px) scaleY(1.12) scaleX(0.91); }
    75%     { transform: translateY(-8px) scaleY(1.06) scaleX(0.96); }
  }
  @keyframes pc-b {
    0%,100% { transform: translateY(0) scaleY(1) scaleX(1); }
    20%     { transform: translateY(2px) scaleY(0.85) scaleX(1.12); }
    50%     { transform: translateY(-15px) scaleY(1.14) scaleX(0.89); }
    75%     { transform: translateY(-10px) scaleY(1.07) scaleX(0.95); }
  }
  @keyframes pc-c {
    0%,100% { transform: translateY(0) scaleY(1) scaleX(1); }
    20%     { transform: translateY(2px) scaleY(0.9) scaleX(1.08); }
    50%     { transform: translateY(-10px) scaleY(1.1) scaleX(0.92); }
    75%     { transform: translateY(-7px) scaleY(1.05) scaleX(0.97); }
  }
  .pca { animation: pc-a 1.35s cubic-bezier(0.34,1.5,0.64,1) infinite; transform-box: fill-box; transform-origin: center 90%; }
  .pcb { animation: pc-b 1.35s cubic-bezier(0.34,1.5,0.64,1) infinite 0.22s; transform-box: fill-box; transform-origin: center 90%; }
  .pcc { animation: pc-c 1.35s cubic-bezier(0.34,1.5,0.64,1) infinite 0.44s; transform-box: fill-box; transform-origin: center 90%; }

  @keyframes rumble {
    0%,100% { transform: none; }
    20%  { transform: translateX(-1.4px) rotate(-0.4deg); }
    50%  { transform: translateX(1.4px) rotate(0.4deg); }
    80%  { transform: translateX(-0.7px); }
  }
  .bucket-grp { animation: rumble 0.38s ease-in-out infinite; transform-box: fill-box; transform-origin: center 50%; }

  @keyframes heat {
    0%,100% { opacity: 0.11; }
    50%     { opacity: 0.26; }
  }
  .heat-glow { animation: heat 1.0s ease-in-out infinite; }

  @keyframes fly-1 {
    0%   { transform: translate(0,0) rotate(0deg) scale(0); opacity:0; }
    7%   { transform: translate(-3px,-6px) rotate(40deg) scale(1.1); opacity:1; }
    55%  { transform: translate(-25px,-37px) rotate(215deg) scale(1); opacity:1; }
    80%  { transform: translate(-28px,-24px) rotate(305deg) scale(0.65); opacity:0.5; }
    100% { transform: translate(-30px,-13px) rotate(360deg) scale(0.15); opacity:0; }
  }
  @keyframes fly-2 {
    0%   { transform: translate(0,0) rotate(0deg) scale(0); opacity:0; }
    7%   { transform: translate(3px,-6px) rotate(-40deg) scale(1.1); opacity:1; }
    55%  { transform: translate(23px,-40px) rotate(-200deg) scale(1); opacity:1; }
    80%  { transform: translate(26px,-27px) rotate(-290deg) scale(0.65); opacity:0.5; }
    100% { transform: translate(27px,-15px) rotate(-355deg) scale(0.15); opacity:0; }
  }
  @keyframes fly-3 {
    0%   { transform: translate(0,0) rotate(0deg) scale(0); opacity:0; }
    7%   { transform: translate(-1px,-8px) rotate(70deg) scale(1.1); opacity:1; }
    55%  { transform: translate(-7px,-46px) rotate(235deg) scale(1); opacity:1; }
    80%  { transform: translate(-8px,-34px) rotate(325deg) scale(0.55); opacity:0.4; }
    100% { transform: translate(-9px,-23px) rotate(395deg) scale(0.1); opacity:0; }
  }
  @keyframes fly-4 {
    0%   { transform: translate(0,0) rotate(0deg) scale(0); opacity:0; }
    7%   { transform: translate(6px,-4px) rotate(-70deg) scale(1.1); opacity:1; }
    55%  { transform: translate(31px,-27px) rotate(-215deg) scale(1); opacity:1; }
    80%  { transform: translate(34px,-16px) rotate(-308deg) scale(0.55); opacity:0.4; }
    100% { transform: translate(35px,-7px) rotate(-375deg) scale(0.1); opacity:0; }
  }
  @keyframes fly-5 {
    0%   { transform: translate(0,0) rotate(0deg) scale(0); opacity:0; }
    7%   { transform: translate(-6px,-3px) rotate(110deg) scale(1.1); opacity:1; }
    55%  { transform: translate(-34px,-21px) rotate(265deg) scale(1); opacity:1; }
    80%  { transform: translate(-36px,-11px) rotate(355deg) scale(0.55); opacity:0.35; }
    100% { transform: translate(-37px,-3px) rotate(415deg) scale(0.1); opacity:0; }
  }
  @keyframes fly-6 {
    0%   { transform: translate(0,0) rotate(0deg) scale(0); opacity:0; }
    7%   { transform: translate(1px,-9px) rotate(-90deg) scale(1.1); opacity:1; }
    55%  { transform: translate(10px,-48px) rotate(-220deg) scale(1); opacity:1; }
    80%  { transform: translate(11px,-36px) rotate(-315deg) scale(0.5); opacity:0.3; }
    100% { transform: translate(12px,-26px) rotate(-385deg) scale(0.1); opacity:0; }
  }
  .k1 { animation: fly-1 2.00s ease-in-out infinite;       transform-box: fill-box; transform-origin: center; }
  .k2 { animation: fly-2 1.85s ease-in-out infinite 0.33s; transform-box: fill-box; transform-origin: center; }
  .k3 { animation: fly-3 1.70s ease-in-out infinite 0.66s; transform-box: fill-box; transform-origin: center; }
  .k4 { animation: fly-4 1.90s ease-in-out infinite 0.98s; transform-box: fill-box; transform-origin: center; }
  .k5 { animation: fly-5 2.10s ease-in-out infinite 1.32s; transform-box: fill-box; transform-origin: center; }
  .k6 { animation: fly-6 1.65s ease-in-out infinite 0.16s; transform-box: fill-box; transform-origin: center; }
</style>
</head>
<body>

<div class="frame">
  <!-- Grain background canvas -->
  <canvas class="grain" id="grain"></canvas>

  <!-- SVG filter for stamp texture on wordmark -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
      <filter id="sp-stamp" x="-8%" y="-20%" width="116%" height="140%">
        <feTurbulence type="fractalNoise" baseFrequency="0.038" numOctaves="4" seed="6" result="warp"/>
        <feDisplacementMap in="SourceGraphic" in2="warp" scale="4" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <!-- Centre content -->
  <div class="content">
    <span class="wordmark">POPCORN</span>
    <div class="popcorn-wrap">
      <svg viewBox="0 0 100 100" width="140" height="140" aria-hidden="true" style="overflow:visible">
        <!-- Heat glow -->
        <ellipse class="heat-glow" cx="50" cy="61" rx="19" ry="10" fill="#fff1cd"/>
        <!-- Bucket -->
        <g class="bucket-grp">
          <rect x="28" y="58" width="44" height="7" rx="2.5" fill="#fff1cd"/>
          <path d="M30 65 L35 94 L65 94 L70 65Z" fill="transparent" stroke="#fff1cd" stroke-width="1.8" stroke-linejoin="round"/>
        </g>
        <!-- Flying kernels -->
        <g class="k1"><circle cx="50" cy="60" r="3.6" fill="#fff1cd"/><circle cx="47" cy="58" r="2.6" fill="#fff1cd"/><circle cx="53" cy="58" r="2.3" fill="#fff1cd"/></g>
        <g class="k2"><circle cx="50" cy="60" r="3.1" fill="#fff1cd"/><circle cx="48" cy="57.5" r="2.1" fill="#fff1cd"/><circle cx="53" cy="58.5" r="2.3" fill="#fff1cd"/></g>
        <g class="k3"><circle cx="50" cy="60" r="3.3" fill="#fff1cd"/><circle cx="47.5" cy="58" r="2.4" fill="#fff1cd"/><circle cx="52.5" cy="57.5" r="2.1" fill="#fff1cd"/></g>
        <g class="k4"><circle cx="50" cy="60" r="2.9" fill="#fff1cd"/><circle cx="52.5" cy="58.5" r="2.2" fill="#fff1cd"/><circle cx="48" cy="58" r="1.9" fill="#fff1cd"/></g>
        <g class="k5"><circle cx="50" cy="60" r="3.1" fill="#fff1cd"/><circle cx="47" cy="58.5" r="2.3" fill="#fff1cd"/><circle cx="52.5" cy="57.5" r="1.9" fill="#fff1cd"/></g>
        <g class="k6"><circle cx="50" cy="60" r="2.7" fill="#fff1cd"/><circle cx="48" cy="57.5" r="2.1" fill="#fff1cd"/><circle cx="52.5" cy="58.5" r="1.9" fill="#fff1cd"/></g>
        <!-- Puffs -->
        <g class="pca"><circle cx="35" cy="50" r="6" fill="#fff1cd"/><circle cx="29" cy="46" r="4.5" fill="#fff1cd"/><circle cx="35" cy="42" r="5" fill="#fff1cd"/><circle cx="41" cy="46" r="4.5" fill="#fff1cd"/></g>
        <g class="pcb"><circle cx="50" cy="46" r="7" fill="#fff1cd"/><circle cx="43" cy="41" r="5" fill="#fff1cd"/><circle cx="50" cy="36" r="6" fill="#fff1cd"/><circle cx="57" cy="41" r="5" fill="#fff1cd"/><circle cx="44" cy="49" r="4" fill="#fff1cd"/><circle cx="56" cy="49" r="4" fill="#fff1cd"/></g>
        <g class="pcc"><circle cx="65" cy="50" r="6" fill="#fff1cd"/><circle cx="59" cy="46" r="4.5" fill="#fff1cd"/><circle cx="65" cy="42" r="5" fill="#fff1cd"/><circle cx="71" cy="46" r="4.5" fill="#fff1cd"/></g>
      </svg>
    </div>
  </div>

  <!-- Coming Soon -->
  <span class="coming-soon">COMING SOON</span>
</div>

<script>
// Grain background — same algorithm as GrainBackground.tsx
(function() {
  const canvas = document.getElementById('grain');
  const W = canvas.parentElement.clientWidth || 390;
  const H = canvas.parentElement.clientHeight || 844;
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  if (!ctx) return;

  ctx.fillStyle = '#053980';
  ctx.fillRect(0, 0, W, H);

  const DS = 4;
  const DW = Math.ceil(W / DS), DH = Math.ceil(H / DS);
  const dmap = new Float32Array(DW * DH);
  const blobs = [];
  for (let i = 0; i < 7; i++) blobs.push({ x: Math.random()*DW, y: Math.random()*DH, s: (0.14+Math.random()*0.22)*DW, w: 0.5+Math.random()*0.9 });
  for (let i = 0; i < 20; i++) blobs.push({ x: Math.random()*DW, y: Math.random()*DH, s: (0.04+Math.random()*0.10)*DW, w: 0.4+Math.random()*0.8 });
  for (let i = 0; i < 40; i++) blobs.push({ x: Math.random()*DW, y: Math.random()*DH, s: (0.01+Math.random()*0.03)*DW, w: 0.2+Math.random()*0.5 });

  for (let by = 0; by < DH; by++) {
    for (let bx = 0; bx < DW; bx++) {
      let sum = 0;
      for (const b of blobs) {
        const dx = bx - b.x, dy = by - b.y;
        sum += b.w * Math.exp(-(dx*dx + dy*dy) / (2 * b.s * b.s));
      }
      dmap[by * DW + bx] = sum;
    }
  }

  const sorted = Array.from(dmap).sort((a, b) => a - b);
  const p90 = sorted[Math.floor(sorted.length * 0.90)] || 1;
  const imgData = ctx.getImageData(0, 0, W, H);
  const data = imgData.data;

  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      const idx = (y * W + x) * 4;
      const fx = x / DS, fy = y / DS;
      const x0 = Math.min(Math.floor(fx), DW - 2);
      const y0 = Math.min(Math.floor(fy), DH - 2);
      const tx = fx - x0, ty = fy - y0;
      const d = (dmap[y0*DW+x0]*(1-tx) + dmap[y0*DW+x0+1]*tx)*(1-ty)
              + (dmap[(y0+1)*DW+x0]*(1-tx) + dmap[(y0+1)*DW+x0+1]*tx)*ty;
      const density = Math.min(1, d / p90);
      if (density < 0.06) continue;
      const effective = 0.1152 + density * 0.5248;
      const gi = effective * (13 + Math.random() * 9);
      const grain = Math.random() * gi - gi * 0.6;
      data[idx]   = Math.max(0,  Math.min(55,   5 + Math.round(grain * 1.472 - 1.28)));
      data[idx+1] = Math.max(7,  Math.min(107, 57 + Math.round(grain * 1.472 - 1.28)));
      data[idx+2] = Math.max(78, Math.min(178, 128 + Math.round(grain * 2.048 - 2.56)));
    }
  }
  ctx.putImageData(imgData, 0, 0);
})();
</script>
</body>
</html>
