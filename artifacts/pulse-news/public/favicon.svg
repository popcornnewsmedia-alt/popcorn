<svg width="512" height="512" viewBox="10 14 80 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="c">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>

  <g clip-path="url(#c)">
    <!-- Background -->
    <rect width="100" height="100" fill="#053980"/>

    <!-- Heat glow — outer diffuse halo -->
    <ellipse cx="50" cy="51" rx="26" ry="13" fill="#fff1cd" opacity="0.13"/>
    <!-- Heat glow — inner bright core -->
    <ellipse cx="50" cy="51" rx="18" ry="8"  fill="#fff1cd" opacity="0.38"/>

    <!-- Bucket rim -->
    <rect x="28" y="49" width="44" height="7" rx="2.5" fill="#fff1cd"/>

    <!-- Bucket body -->
    <path d="M30 56 L35 87 L65 87 L70 56Z"
          fill="rgba(255,241,205,0.13)" stroke="#fff1cd" stroke-width="1.8" stroke-linejoin="round"/>

    <!-- Left puff (pca) — peak bounce: translateY(-11px) -->
    <circle cx="31" cy="42" r="6"   fill="#fff1cd"/>
    <circle cx="25" cy="38" r="4.5" fill="#fff1cd"/>
    <circle cx="31" cy="34" r="5"   fill="#fff1cd"/>
    <circle cx="37" cy="38" r="4.5" fill="#fff1cd"/>

    <!-- Centre puff (pcb) — peak bounce: translateY(-15px) -->
    <circle cx="50" cy="34" r="7"   fill="#fff1cd"/>
    <circle cx="43" cy="29" r="5"   fill="#fff1cd"/>
    <circle cx="50" cy="24" r="6"   fill="#fff1cd"/>
    <circle cx="57" cy="29" r="5"   fill="#fff1cd"/>
    <circle cx="44" cy="37" r="4"   fill="#fff1cd"/>
    <circle cx="56" cy="37" r="4"   fill="#fff1cd"/>

    <!-- Right puff (pcc) — peak bounce: translateY(-10px) -->
    <circle cx="69" cy="43" r="6"   fill="#fff1cd"/>
    <circle cx="63" cy="39" r="4.5" fill="#fff1cd"/>
    <circle cx="69" cy="35" r="5"   fill="#fff1cd"/>
    <circle cx="75" cy="39" r="4.5" fill="#fff1cd"/>
  </g>
</svg>
