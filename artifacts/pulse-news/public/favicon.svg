<svg width="512" height="512" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="c">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>

  <g clip-path="url(#c)">
    <!-- Blue background -->
    <rect width="100" height="100" fill="#053980"/>

    <!-- Heat glow at bucket mouth -->
    <ellipse cx="50" cy="57" rx="26" ry="13" fill="#fff1cd" opacity="0.18"/>

    <!-- Bucket rim -->
    <rect x="18" y="51" width="64" height="12" rx="4.5" fill="#fff1cd"/>

    <!-- Bucket body -->
    <path d="M20 63 L30 97 L70 97 L80 63Z"
          fill="rgba(255,241,205,0.13)" stroke="#fff1cd" stroke-width="2" stroke-linejoin="round"/>

    <!-- Left puff — center x=21 -->
    <circle cx="21" cy="39" r="7.5" fill="#fff1cd"/>
    <circle cx="12" cy="33" r="5.5" fill="#fff1cd"/>
    <circle cx="21" cy="27" r="6.5" fill="#fff1cd"/>
    <circle cx="30" cy="33" r="4.5" fill="#fff1cd"/>

    <!-- Centre puff — center x=50 -->
    <circle cx="50" cy="33" r="8"   fill="#fff1cd"/>
    <circle cx="39" cy="26" r="6.5" fill="#fff1cd"/>
    <circle cx="50" cy="18" r="7.5" fill="#fff1cd"/>
    <circle cx="61" cy="26" r="6.5" fill="#fff1cd"/>
    <circle cx="41" cy="38" r="5"   fill="#fff1cd"/>
    <circle cx="59" cy="38" r="5"   fill="#fff1cd"/>

    <!-- Right puff — center x=79 -->
    <circle cx="79" cy="39" r="7.5" fill="#fff1cd"/>
    <circle cx="70" cy="33" r="4.5" fill="#fff1cd"/>
    <circle cx="79" cy="27" r="6.5" fill="#fff1cd"/>
    <circle cx="88" cy="33" r="5.5" fill="#fff1cd"/>
  </g>
</svg>
