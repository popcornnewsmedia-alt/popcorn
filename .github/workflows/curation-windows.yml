name: Popcorn Curation Windows

# ─────────────────────────────────────────────────────────────────────────────
# 5 daily windows for Bangkok curation (all times BKK = UTC+7):
#
#   W1  BKK 12:30am  (UTC 17:30 prev day)  pulls 7:30pm→12:30am
#   W2  BKK  5:30am  (UTC 22:30 prev day)  pulls 12:30am→5:30am
#   W3  BKK 10:30am  (UTC 03:30)           pulls 5:30am→10:30am
#   W4  BKK  3:30pm  (UTC 08:30)           pulls 10:30am→3:30pm
#   W5  BKK  7:30pm  (UTC 12:30) ← FINAL  pulls 3:30pm→7:30pm → full publish
#
# W1–W4: incremental fetch + select, publish to dev
# W5:    final fetch + select, publish to dev (full day complete)
#
# Required GitHub secret: CURATION_API_URL
#   (e.g. https://workspaceapi-server-production-d088.up.railway.app)
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: "30 17 * * *"   # W1 — BKK 12:30am
    - cron: "30 22 * * *"   # W2 — BKK  5:30am
    - cron: "30  3 * * *"   # W3 — BKK 10:30am
    - cron: "30  8 * * *"   # W4 — BKK  3:30pm
    - cron: "30 12 * * *"   # W5 — BKK  7:30pm (final)

  # Manual trigger — useful for testing or ad-hoc re-runs
  workflow_dispatch:
    inputs:
      window_hours:
        description: "Look-back window in hours"
        required: false
        default: "5"

jobs:
  curation-window:
    name: Curation window
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Compute time window
        run: |
          WINDOW_END=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          HOURS="${{ inputs.window_hours || '5' }}"
          # Add 30 min overlap so no articles fall between windows
          OVERLAP_MINS=$(( ($HOURS * 60) + 30 ))
          WINDOW_START=$(date -u -d "${OVERLAP_MINS} minutes ago" +"%Y-%m-%dT%H:%M:%SZ")
          echo "WINDOW_START=$WINDOW_START" >> $GITHUB_ENV
          echo "WINDOW_END=$WINDOW_END"     >> $GITHUB_ENV
          echo "Window: $WINDOW_START → $WINDOW_END"

      - name: Trigger curation refresh
        run: |
          RESPONSE=$(curl -sL -w "\n%{http_code}" -X POST \
            "${{ secrets.CURATION_API_URL }}/api/refresh" \
            -H "Content-Type: application/json" \
            -d "{\"windowStart\":\"$WINDOW_START\",\"windowEnd\":\"$WINDOW_END\",\"publishToday\":true}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP $HTTP_CODE"
          echo "$BODY"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Curation refresh failed with HTTP $HTTP_CODE"
            exit 1
          fi
