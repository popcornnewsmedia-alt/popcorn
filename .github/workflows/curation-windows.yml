name: Popcorn Curation Windows

# ─────────────────────────────────────────────────────────────────────────────
# SCHEDULE MOVED TO RAILWAY (node-cron inside the api-server process).
# The scheduled triggers below are DISABLED — curation now runs on-time from
# within the Railway container, eliminating GitHub Actions cron delays.
#
# This workflow is kept for MANUAL TRIGGERS ONLY (workflow_dispatch).
# Use it to force a final-window run (ad-hoc publish or testing).
# ─────────────────────────────────────────────────────────────────────────────

on:
  # Manual trigger only — scheduled crons run inside Railway via node-cron
  workflow_dispatch:
    inputs:
      window_hours:
        description: "Window size in hours (default 4)"
        required: false
        default: "4"

jobs:
  curation-window:
    name: Curation window
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Compute time window
        run: |
          # Floor current UTC to the nearest 4-hour boundary so cron delays
          # don't shift the window. 14400 seconds = 4 hours.
          NOW_EPOCH=$(date -u +%s)
          WINDOW_HOURS="${{ inputs.window_hours || '4' }}"
          WINDOW_SECONDS=$(( WINDOW_HOURS * 3600 ))
          OVERLAP_SECONDS=1800   # 30-minute backward overlap to catch boundary articles

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual run: use current time as window end (no flooring)
            WINDOW_END_EPOCH=$NOW_EPOCH
          else
            # Scheduled run: floor to nearest 4-hour boundary
            WINDOW_END_EPOCH=$(( (NOW_EPOCH / 14400) * 14400 ))
          fi

          WINDOW_START_EPOCH=$(( WINDOW_END_EPOCH - WINDOW_SECONDS - OVERLAP_SECONDS ))

          WINDOW_END=$(date -u -d "@$WINDOW_END_EPOCH" +"%Y-%m-%dT%H:%M:%SZ")
          WINDOW_START=$(date -u -d "@$WINDOW_START_EPOCH" +"%Y-%m-%dT%H:%M:%SZ")

          DELAY_MINS=$(( (NOW_EPOCH - WINDOW_END_EPOCH) / 60 ))

          # Run 6 is the final window — UTC boundary 12:00 (BKK 7:00pm).
          # All other runs are shortlist-only: fetch + accumulate, no Claude, no publishing.
          # Manual workflow_dispatch always acts as the final window for testing.
          WINDOW_END_HOUR=$(date -u -d "@$WINDOW_END_EPOCH" +%H)
          if [ "$WINDOW_END_HOUR" = "12" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            IS_FINAL=true
            SHORTLIST_ONLY=false
            echo "Run 6 (FINAL) — full Claude selection + publish"
          else
            IS_FINAL=false
            SHORTLIST_ONLY=true
            echo "Runs 1-5 (SHORTLIST) — accumulating candidates, skipping Claude"
          fi

          echo "WINDOW_START=$WINDOW_START"   >> $GITHUB_ENV
          echo "WINDOW_END=$WINDOW_END"       >> $GITHUB_ENV
          echo "SHORTLIST_ONLY=$SHORTLIST_ONLY" >> $GITHUB_ENV
          echo "Window:    $WINDOW_START → $WINDOW_END"
          echo "Cron delay: ${DELAY_MINS} min"

      - name: Trigger curation refresh
        run: |
          RESPONSE=$(curl -sL -w "\n%{http_code}" -X POST \
            "${{ secrets.CURATION_API_URL }}/api/refresh" \
            -H "Content-Type: application/json" \
            -d "{\"windowStart\":\"$WINDOW_START\",\"windowEnd\":\"$WINDOW_END\",\"publishToday\":true,\"shortlistOnly\":$SHORTLIST_ONLY}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "HTTP $HTTP_CODE"
          echo "$BODY"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Curation refresh failed with HTTP $HTTP_CODE"
            exit 1
          fi
